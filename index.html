<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>꼬꼬의 귀가길</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar" aria-label="게임 정보">
        <div class="brand">
          <strong>꼬꼬의 귀가길</strong>
          <span>푸른 초원</span>
        </div>
        <div class="stats">
          <span><b id="distanceText">0m</b> 이동</span>
          <span><b id="timeText">45.0</b> 초</span>
          <span><b id="bestText">0m</b> 최고</span>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="game" width="960" height="540" aria-label="꼬꼬가 초원을 달려 집으로 돌아가는 게임"></canvas>
        <div id="overlay" class="overlay">
          <div class="result-panel">
            <p id="resultKicker">READY</p>
            <h1 id="resultTitle">꼬꼬 집으로!</h1>
            <p id="resultMeta">좌우 이동과 점프로 집까지 도착하기</p>
            <button id="startButton" type="button">시작</button>

            <div id="submitArea" class="submit-area is-hidden">
              <input id="nickInput" type="text" maxlength="16" placeholder="닉네임" autocomplete="off" inputmode="text">
              <input id="contactInput" type="text" maxlength="40" placeholder="연락처 (당첨 안내용)" autocomplete="off">
              <button id="submitScoreButton" type="button">순위 등록</button>
              <p id="submitStatus" class="submit-status"></p>
            </div>

            <div id="leaderboardArea" class="leaderboard-area is-hidden">
              <p class="lb-title">실시간 순위 <span id="myRankText"></span></p>
              <ol id="leaderboardList" class="leaderboard-list"></ol>
            </div>
          </div>
        </div>
        <button id="muteButton" class="mute-button" type="button" aria-label="음소거" aria-pressed="false">🔊</button>
      </section>

      <nav class="control-pad" aria-label="게임 조작">
        <button id="leftButton" class="control-button" type="button" aria-label="왼쪽">‹</button>
        <button id="jumpButton" class="control-button jump-button" type="button" aria-label="점프">↑</button>
        <button id="rightButton" class="control-button" type="button" aria-label="오른쪽">›</button>
      </nav>
    </main>

    <script src="game.js"></script>
    <script type="module" src="leaderboard.js"></script>
  </body>
</html>
